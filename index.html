<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河南导航 - 高校 & 政府采购</title>
    <meta name="description" content="河南高校官网导航、政府采购网导航，收录182所河南高等院校和19个政府采购网站。">
    <meta property="og:title" content="河南导航 - 高校 & 政府采购">
    <meta property="og:description" content="河南高校官网导航、政府采购网导航。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://leoliu-s.github.io/University-Navigation/assets/og-image.png">
    <meta property="og:url" content="https://leoliu-s.github.io/University-Navigation/">
    <meta property="og:locale" content="zh_CN">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#0f172a">
    <link rel="canonical" href="https://leoliu-s.github.io/University-Navigation/">
    <link rel="manifest" href="site.webmanifest">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
    <link rel="preconnect" href="https://www.google.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap"></noscript>
    <link rel="preload" href="js/data.js" as="script">
    <link rel="stylesheet" href="css/style.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "河南导航",
        "alternateName": "河南高校 & 政府采购导航",
        "url": "https://leoliu-s.github.io/University-Navigation/",
        "description": "河南高校官网导航、政府采购网导航，收录182所河南高等院校和19个政府采购网站。",
        "inLanguage": "zh-CN"
    }
    </script>
</head>
<body>
    <a href="#mainContent" class="skip-link">跳转到主内容</a>
    <button class="menu-toggle" id="menuToggle" aria-label="打开侧边栏菜单" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>

    <button class="back-to-top" id="backToTop" onclick="backToTop()" aria-label="返回顶部">⬆️</button>

    <nav class="top-nav">
        <div class="nav-brand">
            <span>🗺️</span>河南导航
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-module="university">🎓 高校导航</button>
            <button class="nav-tab gov" data-module="gov">📋 政府采购</button>
        </div>
        <div class="nav-stats" id="navStats">
            <span>📚 182 所高校</span>
            <span>📋 19 个政府采购网</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="切换深色/浅色主题">🌙</button>
    </nav>

    <button class="sidebar-toggle" id="sidebarToggle" title="折叠侧边栏" aria-label="折叠侧边栏">◀</button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebarTitle">按城市筛选</h3>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
    </aside>

    <div class="visit-counter" title="仅统计本机浏览器的访问记录，非全站真实流量">
        <div class="counter-item">
            <span class="counter-label">本机访问</span>
            <span class="counter-value" id="totalVisits">0</span>
        </div>
        <div class="counter-item">
            <span class="counter-label">今日</span>
            <span class="counter-value" id="todayVisits">0</span>
        </div>
    </div>

    <main class="main-content" id="mainContent">
        <div class="content-header">
            <div class="content-title">
                <h1 id="pageTitle">河南高校官网导航</h1>
                <span class="subtitle" id="pageSubtitle">182 所高等院校</span>
            </div>
            <div class="search-box">
                <label for="searchInput" class="visually-hidden">在站内搜索高校或采购网站</label>
                <input type="text" id="searchInput" placeholder="搜索网站..." aria-label="站内搜索">
            </div>
            <div class="search-box internet-search">
                <label for="searchEngine" class="visually-hidden">选择搜索引擎</label>
                <select class="search-engine-select" id="searchEngine" aria-label="选择搜索引擎">
                    <option value="baidu">百度</option>
                    <option value="bing">Bing</option>
                    <option value="google">Google</option>
                    <option value="sogou">搜狗</option>
                </select>
                <label for="internetSearch" class="visually-hidden">搜索互联网</label>
                <input type="text" id="internetSearch" placeholder="🔍 搜索互联网..." aria-label="搜索互联网" onkeydown="if(event.key==='Enter')doInternetSearch()">
            </div>
        </div>

        <div class="gov-search-box" id="monitorSearchBox">
            <input type="text" id="monitorKeyword" placeholder="🔔 输入关键词搜索高校动态，如：智慧教室、信息化建设..." onkeydown="if(event.key==='Enter')doMonitorSearch()">
            <select id="monitorScope">
                <option value="all">全部高校</option>
                <option value="郑州市">郑州市</option>
                <option value="洛阳市">洛阳市</option>
                <option value="新乡市">新乡市</option>
                <option value="南阳市">南阳市</option>
                <option value="开封市">开封市</option>
                <option value="其他">其他城市</option>
            </select>
            <button onclick="doMonitorSearch()">全网搜索</button>
        </div>

        <div class="gov-search-box" id="govSearchBox" style="display:none;">
            <input type="text" id="govSearchInput" placeholder="🔍 在河南政府采购网搜索采购项目..." onkeydown="if(event.key==='Enter')doGovSearch()">
            <select id="govSearchSite">
                <option value="henan">河南省本级</option>
                <option value="zhengzhou">郑州市</option>
                <option value="kaifeng">开封市</option>
                <option value="luoyang">洛阳市</option>
                <option value="pingdingshan">平顶山市</option>
                <option value="anyang">安阳市</option>
                <option value="hebi">鹤壁市</option>
                <option value="xinxiang">新乡市</option>
                <option value="jiaozuo">焦作市</option>
                <option value="puyang">濮阳市</option>
                <option value="xuchang">许昌市</option>
                <option value="luohe">漯河市</option>
                <option value="sanmenxia">三门峡市</option>
                <option value="nanyang">南阳市</option>
                <option value="shangqiu">商丘市</option>
                <option value="xinyang">信阳市</option>
                <option value="zhoukou">周口市</option>
                <option value="zhumadian">驻马店市</option>
                <option value="jiyuan">济源市</option>
            </select>
            <button onclick="doGovSearch()">搜索</button>
        </div>

        <div class="filters" id="filters"></div>

        <div class="card-grid" id="cardGrid"></div>

        <footer class="site-footer">
            <div class="footer-content">
                <div class="footer-about">
                    <strong>关于本站</strong>
                    <p>河南导航是一个非官方的公益整理项目，汇总河南省内高校官网与各级政府采购网站入口，方便师生、招投标从业者快速查找。所有链接均指向官方网站，本站不存储、不代理任何交易信息。</p>
                </div>
                <div class="footer-meta">
                    <span id="footerUpdated">数据最后核对：请见 GitHub 提交记录</span>
                    <span>·</span>
                    <a href="https://github.com/LeoLiu-s/University-Navigation" target="_blank" rel="noopener noreferrer">GitHub 仓库</a>
                    <span>·</span>
                    <a href="https://github.com/LeoLiu-s/University-Navigation/issues" target="_blank" rel="noopener noreferrer">反馈 / 报错</a>
                </div>
            </div>
        </footer>
    </main>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/render.js"></script>
    <script src="js/handlers.js"></script>
    <script src="js/app.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').catch(function() {});
    }
    </script>
</body>
</html>
